<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mi espacio diario</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#0F6E56">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="home">
  <h1>Mi espacio diario</h1>
  <p class="subtitle">Elige una zona</p>

  <button class="zone-card" data-zone="desarrollo">
    <span class="zone-icon zone-icon-desarrollo">&#127793;</span>
    <span class="zone-text">
      <span class="zone-title">Desarrollo personal</span>
      <span class="zone-sub">Cuerpo, mente y aprendizaje</span>
    </span>
  </button>

  <button class="zone-card" data-zone="marca">
    <span class="zone-icon zone-icon-marca">&#128161;</span>
    <span class="zone-text">
      <span class="zone-title">Marca personal</span>
      <span class="zone-sub">Contenido y estrategia</span>
    </span>
  </button>

  <button class="zone-card" data-zone="neuroalma">
    <span class="zone-icon zone-icon-neuroalma">&#127891;</span>
    <span class="zone-text">
      <span class="zone-title">Neuroalma</span>
      <span class="zone-sub">Ideas para el proyecto</span>
    </span>
  </button>

  <button class="zone-card" data-zone="salud">
    <span class="zone-icon zone-icon-salud">&#129301;</span>
    <span class="zone-text">
      <span class="zone-title">Mi cuerpo y recuperacion</span>
      <span class="zone-sub">Alimentacion y evolucion de la lesion</span>
    </span>
  </button>

  <p class="fecha" id="fecha"></p>
</div>

<div id="detail" class="hidden">
  <button id="back">&larr; volver</button>
  <h2 id="detail-title"></h2>

  <div id="detail-idea-mode">
    <div id="idea-card" class="idea-card">
      <p class="idea-label">Idea de hoy</p>
      <p id="detail-idea"></p>
      <div id="detail-tags" class="tags"></div>
    </div>

    <div id="extra-content"></div>

    <p class="notes-label">Mis notas</p>
    <textarea id="notes" placeholder="Escribe aqui lo que se te ocurra..."></textarea>
    <p id="guardado" class="guardado"></p>

    <button id="toggle-historial" class="link-button">Ver ideas anteriores</button>
    <div id="historial" class="hidden"></div>
  </div>

  <div id="detail-salud-mode" class="hidden">
    <p class="salud-nota">Esto queda guardado solo en tu movil, en ningun sitio mas.</p>

    <div class="salud-section">
      <p class="salud-titulo">Alimentacion y cuidado corporal</p>
      <textarea id="salud-alimentacion-input" placeholder="Que has comido o que cuidado corporal has hecho hoy..."></textarea>
      <button id="salud-alimentacion-add" class="btn-solid">Anadir entrada</button>
      <div id="salud-alimentacion-lista"></div>
    </div>

    <div class="salud-section">
      <p class="salud-titulo">Evolucion de la lesion</p>
      <p class="salud-sublabel">Nivel de molestia hoy</p>
      <div id="dolor-selector" class="dolor-selector"></div>
      <textarea id="salud-lesion-input" placeholder="Como notas la lesion hoy..."></textarea>
      <button id="salud-lesion-add" class="btn-solid">Anadir entrada</button>
      <div id="salud-lesion-lista"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
